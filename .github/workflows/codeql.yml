name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, independent of the CI gate — SAST results are advisory
    # (posted to the Security tab) rather than a merge/release blocker.
    - cron: "23 4 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # continue-on-error below: code scanning (where these results would be
      # posted) requires the repo to be public or GitHub Advanced Security on
      # a private repo -- job-squire is private today, so both steps fail with
      # "Code scanning is not enabled for this repository". Nothing else
      # depends on this job, so the failure is only cosmetic (a red check),
      # but there's no reason to show red for something that isn't actionable
      # yet. Safe to drop continue-on-error once the repo goes public.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
