name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests under coverage
        # The test suite is self-contained: tests/conftest.py sets SECRET_KEY,
        # a temp DATA_DIR, and seed passwords itself, so no secrets are needed.
        run: coverage run --source=app -m pytest -q

      - name: Coverage report
        run: coverage report --show-missing

      - name: Enforce overall coverage floor
        # Ratchet: raise this as coverage of the remaining modules (ai, main,
        # worker, notify, websearch) is added. Measured 35% at this pass.
        run: coverage report --fail-under=33

      - name: Enforce critical-module coverage floor
        # The security- and correctness-critical surfaces carry a higher bar:
        # crypto + auth are fully covered; mcp_server (the public OAuth server),
        # providers, and search sit well above this floor. Measured 61%.
        run: >
          coverage report --fail-under=58
          --include="app/crypto.py,app/auth.py,app/mcp_server.py,app/providers.py,app/search.py"
