version: 2
updates:
  # Application + dev dependencies (requirements.txt, requirements-dev.txt).
  # Grouped into one PR a week so a single-maintainer project isn't buried
  # in individual bump PRs; pip-audit in CI still catches anything urgent
  # between Dependabot runs.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "CHORE"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CHORE"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CHORE"
