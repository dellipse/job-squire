# Single-container topology: web, worker, and mcp all run inside one
# container under s6-overlay. See docs/PLAN-deployment-modes.md Section 2.
# This is the file the `job-squire` CLI's `create` command generates a
# per-instance copy of (see docs/job-squire-cli.md); this checkout copy is
# for local development.
#
# This file deliberately does NOT set a "user:" directive -- the container
# must start as root so s6-overlay's init can apply PUID/PGID/UMASK and
# drop each service to the non-root "abc" account itself. Forcing a
# non-root user here would break that init.
services:
  job-squire:
    build:
      context: .
      args:
        PUID: "${PUID:-1000}"
        PGID: "${PGID:-1000}"
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0-dev}
    image: ghcr.io/dellipse/job-squire:latest
    container_name: ${INSTANCE_NAME:-job-squire}
    restart: unless-stopped
    # PUID/PGID/UMASK are read by the base image's own init at container
    # start (not baked in at build time), so they're passed through here
    # rather than via a "user:" directive. env_file below also forwards
    # them (and everything else in data/.env) into the running processes;
    # this block guarantees they're set even if data/.env omits them.
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      UMASK: "${UMASK:-022}"
    env_file:
      - data/.env
    volumes:
      # Persistent data (SQLite DB + uploads) lives in a named Docker volume,
      # not a host bind mount. WAL-mode SQLite over a bind mount bridged
      # through a VM (OrbStack/Docker Desktop's virtiofs/gRPC-FUSE layer on
      # macOS/Windows) intermittently throws "disk I/O error" under
      # concurrent access -- see app/db_utils.py's module docstring. A named
      # volume is native storage managed by the Docker/Podman daemon itself,
      # not bridged through the host filesystem, so it doesn't hit that
      # class of bug. Back this up with `job-squire backup` (or
      # scripts/backup.sh, which drives it the same way), not by copying a
      # host directory -- see docs/backup-restore.md.
      - job-squire-data:/data
      # data/.env is the one thing that still needs to be a plain host file:
      # `env_file:` above is read by `docker compose` itself at "up" time,
      # before the named volume even exists, so it can never point inside
      # one. Layering a single-file bind mount on top of the named volume's
      # mount point is safe -- Docker applies mounts in order, and a lone
      # small text file is never touched concurrently by SQLite the way the
      # database itself was.
      - ./data/.env:/data/.env:ro
    healthcheck:
      # Same aggregated check baked into the image's own HEALTHCHECK (web
      # /health, mcp /health, worker heartbeat freshness); declared
      # explicitly here too so `docker compose ps`/`job-squire status`
      # show it without waiting on the image default.
      test: ["CMD", "/etc/s6-overlay/scripts/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    # Standalone / host-port mode (local mode's default): the app is at
    # http://127.0.0.1:${APP_HOST_PORT} and MCP at
    # http://127.0.0.1:${MCP_HOST_PORT}, both loopback-only. `job-squire
    # proxy` rewrites this file's networks: block in place for network
    # mode instead of requiring this section to be hand-edited.
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8080}:8000"
      - "127.0.0.1:${MCP_HOST_PORT:-9000}:${MCP_PORT:-9000}"
    # Lets the container reach a service running natively on this same host
    # (e.g. Ollama) via the literal name "host.docker.internal" -- Docker
    # Desktop/OrbStack already provide that DNS entry for free on macOS/
    # Windows, but plain Docker Engine on Linux needs it spelled out via the
    # special "host-gateway" target (supported on Engine 20.10+). Harmless
    # to declare on every platform. Kept in sync by hand with
    # job_squire_cli/job_squire_cli/ops/compose.py's render_compose_yaml().
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Shared network with SWAG or another nginx container: comment out the
    # ports block above and uncomment this instead.
    # networks:
    #   - swag

volumes:
  # Explicit `name:` so this volume is always literally "job-squire-data",
  # not project-prefixed by Compose's default naming -- matches
  # job_squire_cli/ops/compose.py's render_compose_yaml, which does the same
  # for the same reason (see that function's comment on this). Each
  # CLI-created instance is already its own compose project (`-p` flag), so
  # the same literal key here is safe to reuse across every job-squire
  # instance on a host -- there is no cross-instance collision to guard
  # against by hand.
  job-squire-data:
    name: job-squire-data

# Uncomment if using the shared-network option above.
# Create the network once with: docker network create <network-name>
# networks:
#   swag:
#     external: true
