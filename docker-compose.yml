# Three-container topology: web, worker, and mcp each run in their own
# container. Kept as a fallback for anyone who wants component-level
# isolation (restart or inspect one process independently of the others)
# during the migration to the single-container image. Prefer
# docker-compose.single.yml for new installs -- see
# docs/PLAN-deployment-modes.md Section 2.
#
# The image's own ENTRYPOINT is now s6-overlay's /init (it drives the
# single-container topology and must start as root), which is incompatible
# with the "user:" directive below. Every service here overrides entrypoint
# to bypass /init and exec its process directly, exactly as the pre-s6
# image's default CMD did, so the forced non-root user keeps working.
services:
  job-squire:
    build:
      context: .
      args:
        PUID: "${PUID:-1000}"
        PGID: "${PGID:-1000}"
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0-dev}
    image: ghcr.io/dellipse/job-squire:latest
    container_name: ${INSTANCE_NAME:-job-squire}
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    entrypoint: []
    command: ["gunicorn", "--chdir", "/app", "--bind", "0.0.0.0:8000", "--workers", "2",
              "--timeout", "60", "--access-logfile", "-", "--error-logfile", "-", "wsgi:app"]
    env_file:
      - data/.env
    volumes:
      # Persistent data (SQLite DB + uploads) lives on the host for easy backup.
      # Set DATA_HOST_DIR in data/.env; defaults to ./job-squire/data.
      - ${DATA_HOST_DIR:-./job-squire/data}:/data
    healthcheck:
      # Uses Python (always available in the image) rather than curl.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Option A (default — standalone / host-port mode): SWAG or another reverse
    # proxy can reach the app at http://<host-ip>:${APP_HOST_PORT}. No shared
    # Docker network needed. Override APP_HOST_PORT if 8080 is already in use.
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8080}:8000"
    # Option B (shared network with SWAG or another nginx container): comment out
    # the ports block above and uncomment the networks block below. The proxy
    # reaches job-squire by name on port 8000 without exposing a host port.
    # networks:
    #   - swag

  # Scheduler: runs the automated job search on a cron cadence. Same image,
  # same database volume, different command. Runs as one instance so each
  # scheduled slot fires exactly once.
  job-squire-worker:
    build:
      context: .
      args:
        PUID: "${PUID:-1000}"
        PGID: "${PGID:-1000}"
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0-dev}
    image: ghcr.io/dellipse/job-squire:latest
    container_name: ${INSTANCE_NAME:-job-squire}-worker
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    entrypoint: []
    command: ["python", "-m", "app.worker"]
    env_file:
      - data/.env
    volumes:
      # Persistent data (SQLite DB + uploads) lives on the host for easy backup.
      # Set DATA_HOST_DIR in data/.env; defaults to ./job-squire/data.
      - ${DATA_HOST_DIR:-./job-squire/data}:/data
    healthcheck:
      # No HTTP endpoint on this container, so liveness is a heartbeat file the
      # worker touches every HEARTBEAT_INTERVAL_MINUTES (default 5, see
      # app/worker.py). Threshold below (900s) tolerates two missed beats before
      # flagging unhealthy. This only detects a dead/wedged process — it says
      # nothing about whether search itself is enabled; check the Settings
      # History tab or the Dashboard staleness banner for that.
      test: ["CMD-SHELL", "python -c \"import os,sys,time; p = os.path.join(os.environ.get('DATA_DIR','/data'), '.worker_heartbeat'); sys.exit(0 if os.path.exists(p) and time.time() - os.path.getmtime(p) < 900 else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      job-squire:
        condition: service_healthy

  # MCP connector server (AI analysis "MCP" mode). Serves Streamable HTTP on 9000.
  # Add a reverse-proxy conf (examples/nginx/mcp-squire.subdomain.conf) and set
  # PUBLIC_MCP_URL and PUBLIC_MCP_HOST in data/.env.
  job-squire-mcp:
    build:
      context: .
      args:
        PUID: "${PUID:-1000}"
        PGID: "${PGID:-1000}"
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0-dev}
    image: ghcr.io/dellipse/job-squire:latest
    container_name: ${INSTANCE_NAME:-job-squire}-mcp
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    entrypoint: []
    command: ["python", "-m", "app.mcp_server"]
    env_file:
      - data/.env
    volumes:
      # Persistent data (SQLite DB + uploads) lives on the host for easy backup.
      # Set DATA_HOST_DIR in data/.env; defaults to ./job-squire/data.
      - ${DATA_HOST_DIR:-./job-squire/data}:/data
    healthcheck:
      # Own /health endpoint, always-open, on MCP_PORT (default 9000) rather
      # than the web app's 8000.
      test: ["CMD-SHELL", "python -c \"import os,urllib.request; urllib.request.urlopen('http://localhost:' + os.environ.get('MCP_PORT','9000') + '/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      job-squire:
        condition: service_healthy
    # Option A (standalone): published on localhost so your reverse proxy can
    # reach it at http://<host-ip>:${MCP_HOST_PORT}. MCP_PORT controls the port
    # uvicorn listens on inside the container (must match MCP_PORT in data/.env).
    # Override MCP_HOST_PORT if the host port is already in use.
    ports:
      - "127.0.0.1:${MCP_HOST_PORT:-9000}:${MCP_PORT:-9000}"
    # Option B (shared network with SWAG): comment out ports above and uncomment:
    # networks:
    #   - swag

# Uncomment if using Option B (shared network with SWAG or another nginx container).
# Create the network once with: docker network create <network-name>
# networks:
#   swag:
#     external: true
