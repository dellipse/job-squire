# nginx reverse-proxy config for the Job Squire MCP server.
#
# Works with LinuxServer SWAG or any nginx-based reverse proxy.
#
# Usage:
#   - SWAG:  copy to <swag-config>/nginx/proxy-confs/mcp-squire.subdomain.conf
#   - Other: copy to your proxy's site-config or conf.d directory
#
# Point a DNS record for mcp-squire.<yourdomain> at this server, then reload nginx:
#   docker exec swag nginx -s reload    # SWAG
#   nginx -s reload                     # bare nginx
#
# Add this as a custom connector in Claude using the base URL:
#   https://mcp-squire.<yourdomain>
#
# MCP Streamable HTTP can hold long-lived streaming responses, so buffering is
# off and timeouts are generous.
#
# NOTE: SWAG's proxy.conf already sets proxy_http_version, the Connection header,
# buffering, and timeouts. Do NOT redeclare any proxy_* directive here; nginx
# rejects duplicates. If using bare nginx (not SWAG), you will need to add those
# directives manually — see the nginx docs for proxy_pass configuration.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mcp-squire.*;

    include /config/nginx/ssl.conf;

    # Serve this endpoint over HTTP/1.1. MCP uses unbuffered streaming/SSE, which
    # triggers nginx HTTP/2 framing errors (curl 92 / PROTOCOL_ERROR). HTTP/1.1 is
    # the correct transport for SSE and avoids the problem. (nginx >= 1.25.1)
    http2 off;

    client_max_body_size 12m;

    location / {
        include /config/nginx/proxy.conf;
        resolver 127.0.0.11 valid=30s;
        set $upstream_app job-squire-mcp;
        set $upstream_port 9000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # MCP responses must never be proxy-cached.
        proxy_cache off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }
}
