# nginx reverse-proxy config for the Job Squire web app.
#
# Works with LinuxServer SWAG or any nginx-based reverse proxy.
#
# Usage:
#   - SWAG:  copy to <swag-config>/nginx/proxy-confs/job-squire.subdomain.conf
#   - Other: copy to your proxy's site-config or conf.d directory
#
# Point a DNS record for squire.<yourdomain> at this server, then reload nginx:
#   docker exec swag nginx -s reload    # SWAG
#   nginx -s reload                     # bare nginx
#
# Assumes the job-squire container is named "job-squire" and shares the proxy's
# Docker network so nginx can resolve it by name on port 8000.
# If using host-port mode instead (Option A in docker-compose.yml), replace the
# proxy_pass with: proxy_pass http://<host-ip>:8080;

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name squire.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 12m;

    location / {
        include /config/nginx/proxy.conf;
        # resolver is provided by SWAG; this lets nginx start even if the
        # upstream is briefly down.
        resolver 127.0.0.11 valid=30s;
        set $upstream_app job-squire;
        set $upstream_port 8000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Never proxy-cache responses from this app. Session cookies carry
        # per-user CSRF tokens; a cached login page served to a different
        # user causes "CSRF session token is missing" on form submit.
        # SWAG's default proxy.conf uses $cookie_session for cache bypass,
        # but this app names its cookie after INSTANCE_NAME (e.g.
        # job_squire_session), so the default bypass has no effect.
        proxy_cache off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }
}
