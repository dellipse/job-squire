[tool.ruff]
target-version = "py312"
line-length = 110

[tool.ruff.lint]
# Default rule set (E4, E7, E9, F) — real bugs and syntax errors, not style opinions.
# Kept intentionally small so the gate stays high-signal for a single-maintainer
# project; broaden (e.g. add I, UP, B) once the codebase has been swept for those.
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
# main.py and mcp_server.py define a logger (and, in mcp_server.py, rate-limit
# state) before importing sibling modules that log at import time / would
# otherwise risk circular imports. The reordering is deliberate.
"app/main.py" = ["E402"]
"app/mcp_server.py" = ["E402"]
